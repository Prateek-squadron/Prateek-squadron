<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120" viewBox="0 0 600 120">
  <style>
    .name {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 42px;
      font-weight: 800;
      fill: #1F2937;
    }
    .motto {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 18px;
      font-weight: 400;
      font-style: italic;
      fill: #6B7280;
      opacity: 0;
      animation: fadeIn 1.5s ease-in forwards;
      animation-delay: 1.5s;
    }
    .cursor {
      fill: #0A66C2;
      animation: blink 1s step-end infinite;
    }
    @media (prefers-color-scheme: dark) {
      .name { fill: #F9FAFB; }
      .motto { fill: #9CA3AF; }
      .cursor { fill: #3B82F6; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <defs>
    <clipPath id="typing">
      <rect x="0" y="0" width="0" height="120">
        <animate attributeName="width" from="0" to="600" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" />
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#typing)">
    <text x="50%" y="60" class="name" text-anchor="middle">Prateek Sharma</text>
  </g>
  
  <text x="50%" y="90" class="motto" text-anchor="middle">"system thinking under constraints"</text>
</svg>
