      </g>
      <g clip-path="url(#lc15)">
        <text x="500" y="410" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>Email:</tspan><tspan x="620" fill="#1E293B">ps.prateek1709@gmail.com</tspan></text>
      </g>
