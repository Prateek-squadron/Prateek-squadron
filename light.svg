<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="580" viewBox="0 0 1180 580">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </radialGradient>

    <!-- Animated Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2">
        <animate attributeName="stop-color" values="#0891B2;#6D28D9;#059669;#0891B2" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#6D28D9">
        <animate attributeName="stop-color" values="#6D28D9;#059669;#0891B2;#6D28D9" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#059669">
        <animate attributeName="stop-color" values="#059669;#0891B2;#6D28D9;#059669" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Scanner Line Gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0"/>
      <stop offset="45%" stop-color="#0891B2" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#0891B2" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#0891B2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle Scanlines Overlay -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#94A3B8" opacity="0.03"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Reveal Mask (top to bottom) -->
    <mask id="revealMask" maskUnits="userSpaceOnUse" x="0" y="0" width="1180" height="580">
      <rect x="0" y="0" width="1180" height="0" fill="#ffffff">
        <animate attributeName="height" from="0" to="580" dur="2.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </mask>

    <!-- Line-by-Line Clip Paths -->
    <clipPath id="lc0"><rect x="500" y="55" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="0.70s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc1"><rect x="500" y="75" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="0.82s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc2"><rect x="500" y="95" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="0.94s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc3"><rect x="500" y="115" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.06s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc4"><rect x="500" y="135" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.18s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc5"><rect x="500" y="155" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.30s" fill="freeze"/></rect></clipPath>
    
    <clipPath id="lc6"><rect x="500" y="195" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.42s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc7"><rect x="500" y="215" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.54s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc8"><rect x="500" y="235" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.66s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc9"><rect x="500" y="255" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.78s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc10"><rect x="500" y="275" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="1.90s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc11"><rect x="500" y="295" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="2.02s" fill="freeze"/></rect></clipPath>

    <clipPath id="lc12"><rect x="500" y="335" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="2.14s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc13"><rect x="500" y="355" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="2.26s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc14"><rect x="500" y="375" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="2.38s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc15"><rect x="500" y="395" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="2.50s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc16"><rect x="500" y="415" width="0" height="20"><animate attributeName="width" from="0" to="660" dur="0.4s" begin="2.62s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="1180" height="580" fill="#ffffff" rx="8" ry="8"/>

  <g mask="url(#revealMask)">
    <!-- Terminal Background & Border -->
    <rect x="2" y="2" width="1176" height="576" fill="url(#bgGlow)" rx="8" ry="8" stroke="url(#borderGrad)" stroke-width="2"/>
    
    <!-- Header Bar -->
    <rect x="2" y="2" width="1176" height="30" fill="#E2E8F0" rx="8" ry="8"/>
    <!-- Fixing bottom corners of header -->
    <rect x="2" y="22" width="1176" height="10" fill="#E2E8F0"/>
    
    <!-- Header Dots -->
