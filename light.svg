      </g>

      <!-- Section 3 -->
      <g clip-path="url(#lc12)">
        <text x="500" y="350" font-size="12px" font-weight="bold" fill="#059669">Contact</text>
      </g>
      <g clip-path="url(#lc13)">
        <text x="500" y="370" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>GitHub:</tspan><tspan x="620" fill="#1E293B">github.com/Prateek-squadron</tspan></text>
