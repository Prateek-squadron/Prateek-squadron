      </g>
      <g clip-path="url(#lc4)">
        <text x="500" y="150" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>Education:</tspan><tspan x="620" fill="#1E293B">B.Tech вЂ” VIT Bhopal (2nd Year)</tspan></text>
      </g>
      <g clip-path="url(#lc5)">
        <text x="500" y="170" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>Passions:</tspan><tspan x="620" fill="#1E293B">Automotive, Firearms, Linux</tspan></text>
      </g>

      <!-- Section 2 -->
      <g clip-path="url(#lc6)">
        <text x="500" y="210" font-size="12px" font-weight="bold" fill="#0891B2">Arsenal</text>
      </g>
      <g clip-path="url(#lc7)">
        <text x="500" y="230" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>Core Lang:</tspan><tspan x="620" fill="#1E293B">Python, C++, Bash, SQL</tspan></text>
      </g>
      <g clip-path="url(#lc8)">
        <text x="500" y="250" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>Offensive:</tspan><tspan x="620" fill="#1E293B">Nmap, Burp Suite Pro, OSINT Tools</tspan></text>
