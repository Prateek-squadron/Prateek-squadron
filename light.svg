        <text x="500" y="110" font-size="11px" fill="#7C3AED" xml:space="preserve"><tspan>Alias:</tspan><tspan x="620" fill="#1E293B">PATRIXX</tspan></text>
      </g>
      <g clip-path="url(#lc3)">
