    <circle cx="40" cy="17" r="6" fill="#F59E0B"/>
    <circle cx="60" cy="17" r="6" fill="#10B981"/>
    
    <!-- Terminal Title -->
    <text x="590" y="21" font-family="'Courier New', monospace" font-size="12px" fill="#334155" text-anchor="middle">patrixx@arch:~$ ./recon.sh --target self</text>

    <!-- Scanline Overlay on background -->
    <rect x="2" y="32" width="1176" height="546" fill="url(#scanlines)" rx="0" ry="0" pointer-events="none"/>

    <!-- Content: Left Side -->
    <g transform="translate(30, 70)" filter="url(#softGlow)">
      <text font-family="'Courier New', monospace" font-size="7px" fill="#0891B2" xml:space="preserve">
<tspan x="0" y="0">в–€в–€в–€в–€в–€в–€в•—   в–€в–€в–€в–€в–€в•— в–€в–€в–€в–€в–€в–€в–€в–€в•—в–€в–€в–€в–€в–€в–€в•— в–€в–€в•—в–€в–€в•—  в–€в–€в•—в–€в–€в•—  в–€в–€в•—</tspan>
<tspan x="0" y="9">в–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в•”в•ђв•ђв–€в–€в•—в•љв•ђв•ђв–€в–€в•”в•ђв•ђв•ќв–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в•‘в•љв–€в–€в•—в–€в–€в•”в•ќв•љв–€в–€в•—в–€в–€в•”в•ќ</tspan>
