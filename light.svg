  </g>

  <!-- Animated Scanner Line -->
  <rect x="2" y="-60" width="1176" height="60" fill="url(#scanGrad)" pointer-events="none">
    <animate attributeName="y" from="-60" to="580" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
