<tspan x="0" y="27">в–€в–€в•”в•ђв•ђв•ђв•ќ в–€в–€в•”в•ђв•ђв–€в–€в•—   в–€в–€в•‘   в–€в–€в•”в•ђв•ђв–€в–€в•—в–€в–€в•‘ в–€в–€в•”в–€в–€в•—  в–€в–€в•”в–€в–€в•—</tspan>
<tspan x="0" y="36">в–€в–€в•‘     в–€в–€в•‘  в–€в–€в•‘   в–€в–€в•‘   в–€в–€в•‘  в–€в–€в•‘в–€в–€в•‘в–€в–€в•”в•ќ в–€в–€в•—в–€в–€в•”в•ќ в–€в–€в•—</tspan>
<tspan x="0" y="45">в•љв•ђв•ќ     в•љв•ђв•ќ  в•љв•ђв•ќ   в•љв•ђв•ќ   в•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ќв•љв•ђв•ќ  в•љв•ђв•ќ</tspan>
      </text>
    </g>

    <!-- Neofetch Block (Left Side) -->
    <g transform="translate(30, 160)" font-family="'Courier New', monospace" font-size="11px">
      <text fill="#0891B2" y="0" xml:space="preserve"><tspan x="0">OS</tspan><tspan x="100" fill="#475569">Arch Linux (Hardened)</tspan></text>
      <text fill="#0891B2" y="20" xml:space="preserve"><tspan x="0">Kernel</tspan><tspan x="100" fill="#475569">Linux 6.x</tspan></text>
      <text fill="#0891B2" y="40" xml:space="preserve"><tspan x="0">Shell</tspan><tspan x="100" fill="#475569">bash / zsh</tspan></text>
      <text fill="#0891B2" y="60" xml:space="preserve"><tspan x="0">Terminal</tspan><tspan x="100" fill="#475569">Alacritty В· Kitty</tspan></text>
      <text fill="#0891B2" y="80" xml:space="preserve"><tspan x="0">Uptime</tspan><tspan x="100" fill="#475569">18y (and counting)</tspan></text>
    </g>

    <!-- Content: Right Side -->
    <g font-family="'Courier New', monospace">
      <!-- Section 1 -->
      <g clip-path="url(#lc0)">
        <text x="500" y="70" font-size="12px" font-weight="bold" fill="#0891B2">Profile</text>
      </g>
      <g clip-path="url(#lc1)">
